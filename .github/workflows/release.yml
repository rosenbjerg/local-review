name: release

on:
  push:
    branches: [main]
    # Only cut a release when the actual application changes — server (Go)
    # or frontend. Doc/config-only pushes (README, SPEC, start.sh, workflow
    # tweaks, etc.) don't produce a new binary, so they shouldn't release.
    paths:
      - 'main.go'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'web/**'

# Needed to create tags/releases and upload assets.
permissions:
  contents: write

# Don't let overlapping pushes race on the release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 pulls full history + tags so the changelog step can
      # diff against the previous release tag.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build the frontend once — web/dist is platform-agnostic and embedded
      # into every binary via go:embed.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Pure-Go build (modernc.org/sqlite needs no cgo), so all targets
      # cross-compile from this one Linux runner.
      - name: Build binaries
        run: |
          mkdir -p out
          build() {
            echo "building $3"
            CGO_ENABLED=0 GOOS=$1 GOARCH=$2 \
              go build -trimpath -ldflags="-s -w" -o "out/$3" .
          }
          build darwin  arm64 local-review-darwin-arm64
          build linux   amd64 local-review-linux-amd64
          build windows amd64 local-review-windows-amd64.exe

      # Release notes are the commit titles since the previous release tag.
      - name: Build changelog
        run: |
          prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
            range="$prev_tag..HEAD"
            echo "changelog since $prev_tag"
          else
            range=""
            echo "no previous tag; using full history"
          fi
          commits=$(git log --no-merges --pretty=format:'- %s' $range)
          {
            echo "## Changes"
            echo
            if [ -n "$commits" ]; then echo "$commits"; else echo "- No changes"; fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: v0.0.${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: out/*
