name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. local-review deliberately stays a **local,
        single-user** review tool — see the non-goals in
        [SPEC.md](https://github.com/rosenbjerg/local-review/blob/main/SPEC.md)
        (no multi-user, no remote hosting, no posting reviews back to
        GitHub/GitLab). Requests that fit that scope are the most likely to land.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The motivation — what's awkward or missing today, not just the proposed solution.
      placeholder: When reviewing a large branch I can't tell which files I've already…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds you've tried.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits a local, single-user tool (not collaboration, sync, or remote hosting).
          required: true
